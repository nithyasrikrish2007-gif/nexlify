<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Nexlify University</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><h2><i class="fas fa-university"></i> Nexlify</h2></div>
            <ul class="nav-menu">
                <li><a href="home.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="courses.html" class="nav-link">Courses</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li class="nav-auth"><a href="login.html" class="btn-login">Login</a></li>
                <li class="nav-auth"><a href="signup.html" class="btn-signup">Get Started</a></li>
            </ul>
            <div class="nav-buttons">
                <button id="theme-toggle" title="Toggle Dark/Light Mode"></button>
                <a href="login.html" class="btn-login">Login</a>
                <a href="signup.html" class="btn-signup">Get Started</a>
            </div>
            <div class="hamburger">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="mv-card auth-card">
                <div class="auth-header">
                    <i class="fas fa-graduation-cap"></i>
                    <h2>Join Nexlify University</h2>
                    <p>Start your journey toward a world-class education today</p>
                </div>
                <form id="signupForm">
                    <div class="form-group">

                        <label>Full Name</label>
                        <input type="text" class="form-input" placeholder="Your Full Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-input" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" class="form-input" placeholder="Enter your phone number" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-eye">
                            <input type="password" id="signupPassword" class="form-input" placeholder="Create a strong password" required>
                            <i class="fas fa-eye eye-toggle" onclick="toggleEye('signupPassword', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-eye">
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password" required>
                            <i class="fas fa-eye eye-toggle" onclick="toggleEye('confirmPassword', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select class="form-input" id="roleSelect" style="background:rgba(15,17,26,0.9);color:white;" required>
                            <option value="">Select Your Role</option>
                            <option value="student">🎓 Student</option>
                            <option value="admin">🛡️ Admin</option>
                            <option value="hr">💼 HR</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;margin-top:1rem;">Create Account</button>
                    <div class="divider">
    <span>OR</span>
</div>

<a href="/auth/google" class="social-btn google-btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
    Continue with Google
</a>

<a href="/auth/github" class="social-btn github-btn">
    <i class="fab fa-github"></i>
    Continue with GitHub
</a>
                </form>
                <p class="auth-footer">Already a member? <a href="login.html" class="gold-link">Login here</a></p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
