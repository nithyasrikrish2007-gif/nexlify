<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Nexlify University</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2><i class="fas fa-university"></i> Nexlify</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="courses.html" class="nav-link">Courses</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li class="nav-auth"><a href="login.html" class="btn-login">Login</a></li>
                <li class="nav-auth"><a href="signup.html" class="btn-signup">Get Started</a></li>
            </ul>
            <div class="nav-buttons">
                <a href="login.html" class="btn-login">Login</a>
                <a href="signup.html" class="btn-signup">Get Started</a>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="mv-card auth-card">
                <div class="auth-header">
                    <i class="fas fa-key"></i>
                    <h2>Reset Your Password</h2>
                    <p>Enter your email to receive a one-time code for password reset.</p>
                </div>
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input id="forgotEmail" type="email" class="form-input" placeholder="name@example.com" required>
                    </div>

                    <div id="otp-section" class="form-group" style="display:none;">
                        <label>OTP Code</label>
                        <input id="forgotOtp" type="text" maxlength="6" class="form-input" placeholder="Enter OTP" required>
                    </div>

                    <div id="reset-section" style="display:none;">
                        <div class="form-group">
                            <label>New Password</label>
                            <div class="input-eye">
                                <input id="newPassword" type="password" class="form-input" placeholder="••••••••" required>
                                <i class="fas fa-eye eye-toggle" onclick="toggleEye('newPassword', this)"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-eye">
                                <input id="confirmNewPassword" type="password" class="form-input" placeholder="••••••••" required>
                                <i class="fas fa-eye eye-toggle" onclick="toggleEye('confirmNewPassword', this)"></i>
                            </div>
                        </div>
                    </div>

                    <div class="auth-options" style="margin-bottom:1rem;">
                        <a href="login.html" class="gold-link">Back to Login</a>
                    </div>

                    <button type="button" id="sendOtpBtn" class="btn-primary" style="width:100%;margin-bottom:1rem;">Send OTP</button>
                    <button type="button" id="verifyOtpBtn" class="btn-primary" style="width:100%;margin-bottom:1rem;display:none;">Verify OTP</button>
                    <button type="button" id="resetPasswordBtn" class="btn-primary" style="width:100%;display:none;">Update Password</button>
                </form>
                <p class="auth-footer">Remembered? <a href="login.html" class="gold-link">Login instead</a></p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
